{% extends 'base/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900">

    <!-- Background -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="not-method-blob not-method-blob-1"></div>
        <div class="not-method-blob not-method-blob-2"></div>
        <div class="not-method-blob not-method-blob-3"></div>
        <div class="not-method-grid-pattern absolute inset-0 opacity-10"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 text-center px-4 md:px-8 max-w-2xl mx-auto not-method-fade-in">

        <!-- Error Code -->
        <h1 class="text-9xl md:text-[10rem] font-black bg-gradient-to-r from-indigo-400 via-pink-400 to-teal-400 bg-clip-text text-transparent drop-shadow-lg mb-6">
            405
        </h1>

        <!-- Title -->
        <h2 class="text-4xl md:text-5xl font-bold text-slate-100 mb-4">
            Method Not Allowed
        </h2>

        <!-- Info Box -->
        <div class="bg-slate-800/50 border border-indigo-500/30 rounded-lg p-6 mb-8 backdrop-blur-sm shadow-xl transition-all duration-300 hover:border-pink-500/30">
            <div class="font-mono text-sm text-slate-300 space-y-2 text-left">
                <div class="text-indigo-400">
                    <span class="text-pink-400">&gt;</span> HTTP Method tidak sesuai
                </div>
                <div class="text-indigo-400">
                    <span class="text-teal-400">&gt;</span> Check your request method (GET, POST, PUT, DELETE)
                </div>
                <div class="text-indigo-400">
                    <span class="text-pink-400">&gt;</span> Kembali ke jalur yang benar untuk hasil optimal
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
    
            <button 
                onclick="window.history.back()" 
                class="btn btn-primary btn-lg shadow-lg hover:shadow-xl hover:shadow-indigo-500/50 transition-all duration-300"
            >
                Kembali
            </button>

            <a 
                href="/" 
                class="btn btn-outline btn-lg text-indigo-100 border-indigo-300 bg-indigo-500/10 hover:bg-indigo-500/20 hover:border-indigo-200 transition-all duration-300"
            >
                Home
            </a>

        </div>

    </div>
</div>
{% endblock %}
